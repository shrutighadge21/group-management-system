<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Group</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 40px;
        }

        .container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-save {
            background-color: #28a745;
        }

        .btn-back {
            background-color: #6c757d;
            text-decoration: none;
            padding: 8px 12px;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Group</h2>

    <p class="error" th:text="${error}"></p>

    <form th:action="@{/save-group}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <label>Group Name</label>
        <input type="text" name="name" required>

        <label>Description</label>
        <input type="text" name="description">

        <button type="submit">Save</button>
    </form>

</div>

</body>
</html>
