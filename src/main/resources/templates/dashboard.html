<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Corporate Group Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar-custom {
            background-color: #1f2937;
        }

        .card-stat {
            border-radius: 10px;
        }

        .table thead {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark navbar-custom px-4">
    <span class="navbar-brand">Group Management System</span>
    <div>
        <a href="/add-group" class="btn btn-success btn-sm me-2">
            + Add Group
        </a>
        <a href="/logout" class="btn btn-danger btn-sm">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- SEARCH -->
    <form method="get" th:action="@{/dashboard}" class="row mb-3">
        <div class="col-md-4">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   class="form-control"
                   placeholder="Search by group name">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- STATS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card card-stat shadow-sm text-center">
                <div class="card-body">
                    <h6>Total Groups</h6>
                    <h3 th:text="${totalCount}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-stat shadow-sm text-center">
                <div class="card-body">
                    <h6>Active Groups</h6>
                    <h3 class="text-success" th:text="${activeCount}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-stat shadow-sm text-center">
                <div class="card-body">
                    <h6>Inactive Groups</h6>
                    <h3 class="text-danger" th:text="${inactiveCount}"></h3>
                </div>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6 class="text-center mb-3">Group Status Overview</h6>
                    <div style="height:300px;">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th width="200">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="group : ${groups}">

                    <td th:text="${group.id}"></td>
                    <td th:text="${group.name}"></td>
                    <td th:text="${group.description}"></td>

                    <td>
                        <span th:if="${group.active}"
                              class="badge bg-success">
                            Active
                        </span>

                        <span th:if="${!group.active}"
                              class="badge bg-danger">
                            Inactive
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/toggle-status/{id}(id=${group.id})}"
                           class="btn btn-warning btn-sm me-2">
                            Toggle
                        </a>

                        <a th:href="@{/delete-group/{id}(id=${group.id})}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>

                </tr>
                </tbody>

            </table>

            <!-- PAGINATION -->
            <nav>
                <ul class="pagination justify-content-center">

                    <li class="page-item"
                        th:classappend="${currentPage == 0}? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard(page=${currentPage - 1}, keyword=${keyword})}">
                            Previous
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${currentPage == i}? 'active'">
                        <a class="page-link"
                           th:href="@{/dashboard(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item"
                        th:classappend="${currentPage == totalPages - 1}? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard(page=${currentPage + 1}, keyword=${keyword})}">
                            Next
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>

</div>

<!-- FIXED CHART SCRIPT -->
<script th:inline="javascript">
    const active = [[${activeCount}]];
    const inactive = [[${inactiveCount}]];

    new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
            labels: ['Active', 'Inactive'],
            datasets: [{
                data: [active, inactive],
                backgroundColor: ['#198754', '#dc3545']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

</body>
</html>
